<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#3B0764"/>
    </linearGradient>
    <linearGradient id="starg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Rounded background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Subtle grid pattern -->
  <rect width="512" height="512" rx="96" fill="url(#bg)" opacity=".3"/>
  <!-- Glow circle behind star -->
  <circle cx="256" cy="210" r="130" fill="#7C3AED" opacity=".4" filter="url(#glow)"/>
  <!-- Star -->
  <path d="M256 68
           L282 162 L382 162
           L302 222 L330 316
           L256 258 L182 316
           L210 222 L130 162
           L230 162 Z"
        fill="url(#starg)" filter="url(#glow)"/>
  <!-- "LS" wordmark -->
  <text x="256" y="448"
        font-family="'Poppins', 'Segoe UI', sans-serif"
        font-weight="900"
        font-size="108"
        fill="white"
        text-anchor="middle"
        opacity=".92">LS</text>
</svg>
